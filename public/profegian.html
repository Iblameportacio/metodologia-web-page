<form id="formUpload">
  <input type="file" id="fileInput" />
  <button type="submit">Subir</button>
</form>

<ul id="lista"></ul>

<script>
document.getElementById("formUpload").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Selecciona un archivo");

  try {
    const res = await fetch("/api/upload", {
      method: "POST",
      headers: {
        "x-file-name": file.name
      },
      body: file // <-- IMPORTANTE: no uses FormData
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    alert("Archivo subido correctamente");
    load();

  } catch (err) {
    console.error(err);
    alert("Error subiendo archivo");
  }
});


async function load() {
  const res = await fetch("/api/list");
  const files = await res.json();

  document.getElementById("lista").innerHTML = files
    .map(f => `<li>
        <a href="${f.url}" target="_blank">${f.pathname}</a>
        <button onclick="eliminar('${f.pathname}')">Eliminar</button>
    </li>`)
    .join("");
}

async function eliminar(path) {
  try {
    const res = await fetch("/api/delete?path=" + encodeURIComponent(path), {
      method: "DELETE"
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    alert("Archivo eliminado");
    load();

  } catch (err) {
    alert("Error eliminando archivo");
  }
}

load();
</script>
