<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Subir trabajos - Profe Gian</title>
</head>
<body>

  <h1>Panel del Profesor</h1>

  <h2>Subir PDF</h2>

  <form id="formUpload">
    <input type="file" id="fileInput" accept="application/pdf" />
    <button type="submit">Subir</button>
  </form>

  <h2>Archivos subidos</h2>
  <ul id="lista"></ul>

  <script>
    document.getElementById("formUpload").addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Selecciona un archivo");

      const res = await fetch("/api/upload", {
        method: "PUT",
        headers: {
          "x-file-name": file.name,
          "Content-Type": file.type || "application/octet-stream"
        },
        body: file
      });

      if (!res.ok) {
        const text = await res.text().catch(()=>null);
        return alert("Error subiendo archivo: " + (text || res.status));
      }

      alert("Archivo subido correctamente");
      load();
    });

    async function load() {
      const res = await fetch("/api/list");
      const files = await res.json();

      document.getElementById("lista").innerHTML = files
        .map(f => {
          const url = f.url || f.href;
          return `<li>
            <a href="${url}" target="_blank">${f.pathname}</a>
            <button onclick="eliminar('${f.pathname}')">Eliminar</button>
          </li>`;
        })
        .join("");
    }

    async function eliminar(pathname) {
      const res = await fetch("/api/delete?path=" + encodeURIComponent(pathname), {
        method: "DELETE",
      });

      if (!res.ok) {
        const txt = await res.text().catch(()=>null);
        return alert("Error eliminando archivo");
      }

      alert("Archivo eliminado");
      load();
    }

    load();
  </script>

</body>
</html>
