<form id="formUpload">
  <input type="file" id="fileInput" />
  <button type="submit">Subir</button>
</form>

<ul id="lista"></ul>

<script>
document.getElementById("formUpload").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Selecciona un archivo");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/api/upload", {
    method: "POST",
    body: formData
  });

  if (!res.ok) return alert("Error subiendo archivo");

  alert("Archivo subido correctamente");

  load();
});


async function load() {
  const res = await fetch("/api/list");
  const files = await res.json();

  document.getElementById("lista").innerHTML = files
    .map(f => `<li>
        <a href="${f.url}" target="_blank">${f.pathname}</a>
        <button onclick="eliminar('${f.pathname}')">Eliminar</button>
    </li>`)
    .join("");
}

async function eliminar(path) {
  const res = await fetch("/api/delete?path=" + encodeURIComponent(path), {
    method: "DELETE"
  });

  if (!res.ok) return alert("Error eliminando archivo");
  alert("Archivo eliminado");
  load();
}

load();
</script>
